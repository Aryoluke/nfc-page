            a.href = url;
            a.download = 'AryanMehta.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            if (webhookURL === "WEBHOOK_URL_PLACEHOLDER") { console.log("Webhook not configured."); return; }
            function getOS() {
                var ua = navigator.userAgent;
                if (/Windows/.test(ua)) return "Windows";
                if (/Mac OS/.test(ua) && !/iPhone/.test(ua)) return "macOS";
                if (/Linux/.test(ua) && !/Android/.test(ua)) return "Linux";
                if (/Android/.test(ua)) return "Android";
                if (/iPhone/.test(ua) || /iPad/.test(ua)) return "iOS";
                return "Unknown";
            }
            function getDevice() {
                var ua = navigator.userAgent;
                if (/Mobile/.test(ua) && /Android/.test(ua)) return "Phone";
                if (/Mobile/.test(ua) && /iPhone/.test(ua)) return "Phone";
                if (/iPad/.test(ua) || /Tablet/.test(ua)) return "Tablet";
                if (/Android/.test(ua) && !/Mobile/.test(ua)) return "Tablet";
                return "Desktop";
            }
            function sendToDiscord(geo) {
                var fields = [
                    { name: "\uD83C\uDF10 IP", value: geo.query, inline: true },
                    { name: "\uD83D\uDCCD Location", value: (geo.city || "?") + ", " + (geo.regionName || "?") + ", " + (geo.country || "?"), inline: true },
                    { name: "\uD83D\uDCE1 ISP", value: geo.isp || "?", inline: true },
                    { name: "\uD83D\uDCBB OS", value: getOS(), inline: true },
                    { name: "\uD83D\uDCF1 Device", value: getDevice(), inline: true },
                    { name: "\uD83C\uDF0D Browser", value: navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge|Opera)\/[\d.]+/)?.[0] || "Unknown", inline: true },
                    { name: "\u23F0 Time", value: new Date().toLocaleString(), inline: true }
                ];
                var data = {
                    content: null,
                    embeds: [{
                        title: "NFC Page Visited",
                        color: 0x5865F2,
                        fields: fields,
                        timestamp: new Date().toISOString()
                    }]
                };
                fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                }).catch(function(e) { console.log("Webhook error:", e); });
