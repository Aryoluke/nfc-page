        (function() {

            if (webhookURL === "WEBHOOK_URL_PLACEHOLDER") { console.log("Webhook not configured."); return; }
            var ua = navigator.userAgent;
            // OS detection
            var os = "Unknown";
            if (/Android/i.test(ua)) os = "Android";
            else if (/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
            else if (/Windows/i.test(ua)) os = "Windows";
            else if (/Mac/i.test(ua)) os = "macOS";
            else if (/Linux/i.test(ua)) os = "Linux";
            // Device type
            var deviceType = "Desktop";
            if (/Mobi|Android/i.test(ua)) deviceType = "Mobile";
            else if (/iPad|Tablet/i.test(ua)) deviceType = "Tablet";
            // Browser detection
            var browser = "Unknown";
            if (/SamsungBrowser/i.test(ua)) browser = "Samsung Internet";
            else if (/Edg/i.test(ua)) browser = "Edge";
            else if (/OPR|Opera/i.test(ua)) browser = "Opera";
            else if (/Chrome/i.test(ua) && /Safari/i.test(ua) && !/Edg|OPR|Opera/i.test(ua)) browser = "Chrome";
            else if (/Safari/i.test(ua) && !/Chrome|CriOS|FxiOS/i.test(ua)) browser = "Safari";
            else if (/Firefox/i.test(ua)) browser = "Firefox";
            var data = {
                content: null,
                embeds: [{
                    title: "NFC Page Visited",
                    color: 0x5865F2,
                    fields: [
                        { name: "OS", value: os, inline: true },
                        { name: "Device", value: deviceType, inline: true },
                        { name: "Browser", value: browser, inline: true },
                        { name: "Time", value: new Date().toLocaleString(), inline: true }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };
            fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).catch(function(e) { console.log("Webhook error:", e); });
