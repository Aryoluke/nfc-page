          if (webhookURL === "WEBHOOK_URL_PLACEHOLDER") { console.log("Webhook not configured."); return; }
          function getOS() {
              var ua = navigator.userAgent;
              if (/Windows/.test(ua)) return "Windows";
              if (/Mac OS/.test(ua) && !/iPhone/.test(ua)) return "macOS";
              if (/Linux/.test(ua) && !/Android/.test(ua)) return "Linux";
              if (/Android/.test(ua)) return "Android";
              if (/iPhone/.test(ua) || /iPad/.test(ua)) return "iOS";
              return "Unknown";
          }
          function getDevice() {
              var ua = navigator.userAgent;
              if (/Mobile/.test(ua) && /Android/.test(ua)) return "Phone";
              if (/Mobile/.test(ua) && /iPhone/.test(ua)) return "Phone";
              if (/iPad/.test(ua) || /Tablet/.test(ua)) return "Tablet";
              if (/Android/.test(ua) && !/Mobile/.test(ua)) return "Tablet";
              return "Desktop";
          }
          function sendNotifications(geo) {
              var os = getOS();
              var device = getDevice();
              var browser = navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge|Opera)\/[\d.]+/)?.[0] || "Unknown";

              // Discord embed
              var fields = [
                  { name: "\uD83D\uDCBB OS", value: os, inline: true },
                  { name: "\uD83D\uDCF1 Device", value: device, inline: true },
                  { name: "\uD83C\uDF0D Browser", value: browser, inline: true },
                  { name: "\u23F0 Time", value: new Date().toLocaleString(), inline: true }
              ];

                  fields.push({ name: "\uD83C\uDF0D Country", value: geo.country || "Unknown", inline: true });
                  fields.push({ name: "\uD83C\uDFD9\uFE0F City", value: geo.city || "Unknown", inline: true });

                  fields.push({ name: "\uD83D\uDD50 Time Zone", value: geo.timezone || "Unknown", inline: true });
              }
              var discordData = {
                  content: null,
                  embeds: [{
                      title: "NFC Page Visited",
                      color: 0x5865F2,
                      fields: fields,
                      footer: { text: "\u00A9 2026 Aryan Mehta" },
                      timestamp: new Date().toISOString()

              }).catch(function(e) { console.log("Webhook error:", e); });

              // Also ping Telegram

                          text: tgText,
                          parse_mode: "Markdown"
                      })
                  }).catch(function(e) { console.log("TG fail", e); });
              }
          }

              .then(function(r) { return r.json(); })
              .then(function(ipData) {

              .then(function(geo) { sendNotifications(geo); })
