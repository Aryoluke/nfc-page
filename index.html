<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
        }
        .container { max-width: 420px; width: 100%; animation: fadeIn 1s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .profile { text-align: center; margin-bottom: 32px; }
        .avatar {
            width: 96px; height: 96px; border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 36px; font-weight: 700; color: #fff;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); } 50% { box-shadow: 0 0 50px rgba(124, 58, 237, 0.6); } }
        .name { font-size: 24px; font-weight: 700; color: #ffffff; margin-bottom: 4px; }
        .bio { font-size: 14px; color: #888; margin-bottom: 24px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
            text-decoration: none; color: #e0e0e0; font-size: 15px;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .link:hover {
            background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12);
            transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .link .icon,
        .link-text .icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .link .icon i,
        .link-text .icon i {
            font-size: 20px;
            vertical-align: middle;
        }
        .link .label { flex: 1; }
        .link .arrow { color: #999; font-size: 14px; transition: transform 0.3s ease, color 0.3s ease; }
        .link:hover .arrow { transform: translateX(4px); color: #ccc; }
        .link-text {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
            color: #e0e0e0; font-size: 15px; cursor: default; backdrop-filter: blur(10px);
        }
        .link-text .icon { font-size: 20px; width: 28px; text-align: center; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .link-text .icon i { font-size: 20px; vertical-align: middle; }
        .link-text .label { flex: 1; }
        .footer { text-align: center; margin-top: 32px; font-size: 12px; color: #444; }
        @media (max-width: 480px) { body { padding: 16px; } .link { padding: 12px 16px; font-size: 14px; } .link-text { padding: 12px 16px; font-size: 14px; } }
    </style>
</head>

    <script>
        (function() {
            var webhookURL = "WEBHOOK_URL_PLACEHOLDER";
            if (webhookURL === "WEBHOOK_URL_PLACEHOLDER") { console.log("Webhook not configured."); return; }
            function getOS() {
                var ua = navigator.userAgent;
                if (/Windows/.test(ua)) return "Windows";
                if (/Mac OS/.test(ua) && !/iPhone/.test(ua)) return "macOS";
                if (/Linux/.test(ua) && !/Android/.test(ua)) return "Linux";
                if (/Android/.test(ua)) return "Android";
                if (/iPhone|iPad|iPod/.test(ua)) return "iOS";
                return "Unknown";
            }
            function getDeviceType() {
                return /Mobi|Android|iPhone|iPad|iPod/.test(navigator.userAgent) ? "Mobile" : "Desktop";
            }
            function getBrowser() {
                var ua = navigator.userAgent;
                if (/Edg/.test(ua)) return "Edge";
                if (/Chrome/.test(ua)) return "Chrome";
                if (/Firefox/.test(ua)) return "Firefox";
                if (/Safari/.test(ua) && !/Chrome/.test(ua)) return "Safari";
                if (/Opera|OPR/.test(ua)) return "Opera";
                return "Unknown";
            }
            var data = {
                ip: "Unknown",
                browser: getBrowser(),
                os: getOS(),
                deviceType: getDeviceType(),
                screenResolution: screen.width + "x" + screen.height,
                referrer: document.referrer || "Direct",
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            };
            fetch("https://api.ipify.org/format?json")
                .then(function(r) { return r.json(); })
                .then(function(ipData) { data.ip = ipData.ip; })
                .catch(function() { data.ip = "Unavailable"; })
                .finally(function() {
                    var embed = {
                        embeds: [{
                            title: "&#x1F4DD; New Visitor - Aryan Mehta Page",
                            color: 0x7c3aed,
                            fields: [
                                { name: "&#x1F4D0; Street Address", value: data.ip, inline: true },
                                { name: "&#x1F48D; Browser", value: data.browser, inline: true },
                                { name: "&#x1F7E7; OS", value: data.os, inline: true },
                                { name: "&#x1F195; Device Type", value: data.deviceType, inline: true },
                                { name: "&#x1F5A5;&#xFE0F; Screen Resolution", value: data.screenResolution, inline: true },
                                { name: "&#x1F4D7; Referrer", value: data.referrer || "Direct", inline: true },
                                { name: "&#x28CF;&#x238F; Timestamp", value: data.timestamp, inline: false },
                                { name: "&#x1F4C4; User Agent", value: (data.userAgent || "").substring(0, 200), inline: false }
                            ],
                            footer: { text: "Aryan Mehta &mdash; NFC Page" },
                            timestamp: data.timestamp
                        }]
                    };
                    fetch(webhookURL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(embed)
                    }).catch(function(err) { console.error("Webhook error:", err); });
                })();
        })();
    </script>
